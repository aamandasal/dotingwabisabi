<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ SITENAME }}{% endblock title %}</title>
    <meta name="description" content="{{ SITESUBTITLE }}" />
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css" />
    {% if FEED_ALL_ATOM %}
    <link href="{{ FEED_DOMAIN }}/{{ FEED_ALL_ATOM }}" type="application/atom+xml" rel="alternate" title="{{ SITENAME }}" />
    {% endif %}
</head>
<body>
    <div class="page">
        <header class="site-header">
            <a class="brand" href="{{ SITEURL }}/">{{ SITENAME }}</a>
            <p class="brand-sub">{{ SITESUBTITLE }}</p>
            <nav class="site-nav">
                {% for title, link in MENUITEMS %}<a href="{{ SITEURL }}{{ link }}">{{ title }}</a>{% endfor %}
            </nav>
        </header>

        <div class="fleuron" aria-hidden="true">&#10087;</div>

        <main class="site-main">
            {% block content %}{% endblock content %}
        </main>

        <div class="fleuron" aria-hidden="true">&#10087;</div>

        <footer class="site-footer">
            <p>&copy; {{ SITENAME }} &middot; escrito a mano, publicado con calma.</p>
        </footer>
    </div>
</body>
</html>
