{% extends "base.html" %}
{% block title %}{{ tag }} — {{ SITENAME }}{% endblock title %}
{% block content %}
<section class="post-header"><h1 class="post-title">{{ tag }}</h1></section>
<section class="archive-list">
    {% for article in articles %}
    <a class="archive-row" href="{{ SITEURL }}/{{ article.url }}">
        <span class="archive-date">{{ article.date.strftime('%Y·%m·%d') }}</span>
        <span class="archive-title">{{ article.title }}</span>
    </a>
    {% endfor %}
</section>
{% endblock content %}
